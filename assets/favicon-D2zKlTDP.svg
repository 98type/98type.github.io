<svg 
  width="40" 
  height="60" 
  viewBox="0 0 40 60" 
  fill="none" 
  xmlns="http://www.w3.org/2000/svg"
  aria-labelledby="iconTitle"
  role="img"
>
  <title id="iconTitle">98 Type Badge (Horizontal)</title>
  
  <defs>
    <filter id="shadow-sm" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="rgb(0 0 0 / 0.05)" />
    </filter>
  </defs>

  <g font-family="'Noto Sans SC', sans-serif" font-weight="900">
    
    <!-- "98" Badge (same as before) -->
    <rect 
      x="5" 
      y="10" 
      width="30" 
      height="22" 
      rx="4" 
      fill="#1e293b" 
      filter="url(#shadow-sm)"
    />
    <text 
      x="20" 
      y="21.5" 
      font-size="12" 
      fill="white" 
      text-anchor="middle" 
      dominant-baseline="middle"
    >
      98
    </text>
    
    <!-- Horizontally aligned "TYPE" text -->
    <text 
      x="20" 
      y="44" 
      font-size="12" 
      fill="#94a3b8" 
      text-anchor="middle"
      letter-spacing="0.1em"
      style="text-transform: uppercase;"
    >
      Type
    </text>

  </g>
</svg>